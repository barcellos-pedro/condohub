# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'condohub-solitary-shape-2752'
primary_region = 'gru'
console_command = '/rails/bin/rails console'

[build]

[env]
  DATABASE_URL = 'sqlite3:///data/production.sqlite3'
  PORT = '3000'          # Tells Puma to run internally on 3000
  THRUSTER_PORT = '8080' # Tells Thruster to listen on 8080 (Non-root safe)

[processes]
  # This explicitly forces Fly to run Thruster alongside your Rails server
  app = "./bin/thrust ./bin/rails server"

[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 8080   # Fly looks for traffic on Thruster's 8080 port
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '15s'  # Slightly bumped to give Rails initialization breathing room
    method = 'GET'
    path = '/up'
    protocol = 'http'
    tls_skip_verify = false

    [http_service.checks.headers]
      X-Forwarded-Proto = 'https'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024